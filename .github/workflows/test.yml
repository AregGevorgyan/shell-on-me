name: Unit tests

on:
  push:
    branches: [main]
    paths:
      - 'common/**'
  pull_request:
    branches: [main]
    paths:
      - 'common/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run lint
        run: bun run lint
        working-directory: ./common
      - name: Run unit tests
        run: bun run test
        working-directory: ./common
